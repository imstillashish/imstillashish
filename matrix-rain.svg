<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Matrix Rain">
  <defs>
    <linearGradient id="gR" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#00FF41" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00FF41" stop-opacity="0.1"/>
    </linearGradient>
    <pattern id="p" width="40" height="18" patternUnits="userSpaceOnUse">
      <text x="0" y="14" font-family="monospace" font-size="14" fill="url(#gR)">0101</text>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117"/>
  <rect width="100%" height="100%" fill="url(#p)" opacity="0.12">
    <animate attributeName="y" from="-240" to="240" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
