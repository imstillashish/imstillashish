<svg width="400" height="40" viewBox="0 0 400 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700&amp;display=swap');
      
      .text {
        font-family: 'Bricolage Grotesque', system-ui, sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #181715;
        letter-spacing: -0.3px;
      }
      
      .cell-base {
        fill: #f4f8fb;
        stroke: rgba(32,32,32,0.12);
        stroke-width: 1px;
      }

      @media (prefers-color-scheme: dark) {
        .text { fill: #f4f8fb; }
        .cell-base { fill: #202020; stroke: #333; }
      }
      
      .cell {
        animation: tetris 2s infinite ease-in-out;
        transform-box: fill-box;
        transform-origin: center;
      }
      
      @keyframes tetris {
        0%, 15% { fill: transparent; transform: scale(1); }
        50%, 85% { fill: #1591dc; transform: scale(1.15); stroke: #1591dc; }
        100% { fill: transparent; transform: scale(1); }
      }
      
      .c1 { animation-delay: 0.0s; }
      .c2 { animation-delay: 0.1s; }
      .c3 { animation-delay: 0.2s; }
      .c4 { animation-delay: 0.1s; }
      .c5 { animation-delay: 0.2s; }
      .c6 { animation-delay: 0.3s; }
      .c7 { animation-delay: 0.2s; }
      .c8 { animation-delay: 0.3s; }
      .c9 { animation-delay: 0.4s; }
    </style>
  </defs>

  <g transform="translate(0, 8)">
    <g transform="translate(0,0)"><rect x="0" y="0" width="7" height="7" class="cell-base cell c1" rx="1"/></g>
    <g transform="translate(8,0)"><rect x="0" y="0" width="7" height="7" class="cell-base cell c2" rx="1"/></g>
    <g transform="translate(16,0)"><rect x="0" y="0" width="7" height="7" class="cell-base cell c3" rx="1"/></g>
    
    <g transform="translate(0,8)"><rect x="0" y="0" width="7" height="7" class="cell-base cell c4" rx="1"/></g>
    <g transform="translate(8,8)"><rect x="0" y="0" width="7" height="7" class="cell-base cell c5" rx="1"/></g>
    <g transform="translate(16,8)"><rect x="0" y="0" width="7" height="7" class="cell-base cell c6" rx="1"/></g>
    
    <g transform="translate(0,16)"><rect x="0" y="0" width="7" height="7" class="cell-base cell c7" rx="1"/></g>
    <g transform="translate(8,16)"><rect x="0" y="0" width="7" height="7" class="cell-base cell c8" rx="1"/></g>
    <g transform="translate(16,16)"><rect x="0" y="0" width="7" height="7" class="cell-base cell c9" rx="1"/></g>
  </g>
  
  <text x="36" y="27" class="text">Featured Project: Orthex</text>
</svg>
