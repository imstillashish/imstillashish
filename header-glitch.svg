<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#00FF41"/>
      <stop offset="0.5" stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#FF006E"/>
    </linearGradient>
    <filter id="glitch">
      <feTurbulence baseFrequency="0.02" numOctaves="2" result="t" />
      <feDisplacementMap in="SourceGraphic" in2="t" scale="6" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <mask id="m">
      <rect width="100%" height="100%" fill="white"/>
    </mask>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117"/>
  <g mask="url(#m)">
    <text x="50%" y="48%" dominant-baseline="middle" text-anchor="middle" font-family="Fira Code, monospace" font-size="48" fill="url(#g)" style="font-weight:700">
      ASHISH P. — WINDSURF OPERATIONS
    </text>

    <!-- Glitch layers -->
    <g filter="url(#glitch)" opacity="0.9">
      <text x="50%" y="48%" dominant-baseline="middle" text-anchor="middle" font-family="Fira Code, monospace" font-size="48" fill="#00FF41" style="mix-blend-mode:screen; transform: translateY(2px);">
        ASHISH P. — WINDSURF OPERATIONS
      </text>
    </g>
    <g opacity="0.7" transform="translate(-3,1)">
      <text x="50%" y="48%" dominant-baseline="middle" text-anchor="middle" font-family="Fira Code, monospace" font-size="48" fill="#FF006E" style="mix-blend-mode:screen;">
        ASHISH P. — WINDSURF OPERATIONS
      </text>
    </g>
  </g>

  <!-- Animated scanline -->
  <rect x="-200" y="0" width="200" height="220" fill="#ffffff" opacity="0.03">
    <animate attributeName="x" from="-300" to="1200" dur="5s" repeatCount="indefinite" />
  </rect>
</svg>
